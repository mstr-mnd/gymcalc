services:
  app:
    build:
      context: .
      args:
        # Pulled from the .env file next to this compose file.
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
